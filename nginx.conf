server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API calls to volta-auth-proxy
    #
    # ▼ upstream は環境ごとに差し替えること ▼
    # 下記 192.168.1.13:7070 は dev/サンプル値。prod では volta-auth-proxy の
    # 実ホストに合わせて 3 ブロック (/api/, /auth/, /.well-known/) すべて
    # 書き換える。
    # この repo には Dockerfile / compose / entrypoint が含まれておらず、
    # イメージビルドと nginx.conf の供給は外部 (デプロイ基盤側) で行われる。
    # そのため envsubst テンプレート化 (nginx.conf.template + entrypoint で
    # env 展開) は、供給側の entrypoint を確認・改修できないまま行うと
    # 「${VAR} が展開されず literal のまま nginx に渡り起動失敗」する危険が
    # あるため、ここでは見送る。変数化する場合は供給側で
    #   - nginx.conf を nginx.conf.template にリネーム
    #   - entrypoint で `envsubst '${AUTH_PROXY_UPSTREAM}' < template > conf`
    #   - env AUTH_PROXY_UPSTREAM (default 192.168.1.13:7070) を注入
    # を一括で入れること。
    location /api/ {
        proxy_pass http://192.168.1.13:7070;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /auth/ {
        proxy_pass http://192.168.1.13:7070;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /.well-known/ {
        proxy_pass http://192.168.1.13:7070;
        proxy_set_header Host $host;
    }
}
