name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-and-lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build (Vite)
        run: npm run build

      - name: Lint (ESLint)
        # Warn-only: existing code has no-unused-vars / setState-in-effect
        # findings to be cleaned up separately.
        continue-on-error: true
        run: npm run lint
